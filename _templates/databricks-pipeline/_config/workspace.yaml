# Workspace Configuration (Layer 3 Factory)
#
# This file is the single source of truth for Databricks connection details
# and resource paths. Every stage reads from here.
#
# Replace the {{PLACEHOLDERS}} during `setup`. Once filled in, this file
# should be re-read at the start of every stage but never edited mid-run.

# ---------- Workspace identity ----------
databricks_workspace_url: "{{DATABRICKS_WORKSPACE_URL}}"   # e.g. https://dbc-ad8bbac7-4dce.cloud.databricks.com
databricks_workspace_id: "{{DATABRICKS_WORKSPACE_ID}}"     # workspace ID from the URL slug
auth_method: "{{AUTH_METHOD}}"                              # "oidc" | "pat" (Free Edition 2026+ is OIDC only)
profile_name: "{{DATABRICKS_PROFILE}}"                      # CLI profile name, default: "DEFAULT"

# ---------- Unity Catalog ----------
catalog_name: "{{CATALOG_NAME}}"                            # top-level catalog for this dataset
bronze_schema: "{{BRONZE_SCHEMA}}"                          # default: "{dataset_slug}_bronze"
silver_schema: "{{SILVER_SCHEMA}}"                          # default: "{dataset_slug}_silver"
gold_schema:   "{{GOLD_SCHEMA}}"                            # default: "{dataset_slug}_gold"

# ---------- Volume paths (CRITICAL: must use dbfs:/ prefix even for Volumes) ----------
# See shared/databricks-free-edition-gotchas.md for why.
volume_root: "{{VOLUME_ROOT}}"                              # e.g. dbfs:/Volumes/{catalog}/{bronze_schema}/raw
bronze_volume_path: "{{BRONZE_VOLUME_PATH}}"                # e.g. dbfs:/Volumes/{catalog}/{bronze_schema}/raw
silver_volume_path: "{{SILVER_VOLUME_PATH}}"                # e.g. dbfs:/Volumes/{catalog}/{silver_schema}/cleansed
gold_volume_path:   "{{GOLD_VOLUME_PATH}}"                  # e.g. dbfs:/Volumes/{catalog}/{gold_schema}/aggregates
quarantine_volume_path: "{{QUARANTINE_VOLUME_PATH}}"        # invalid rows from Silver, default: dbfs:/Volumes/{catalog}/{silver_schema}/quarantine

# ---------- Compute ----------
compute_type: "{{COMPUTE_TYPE}}"                            # "cluster_id" | "serverless"
cluster_id: "{{CLUSTER_ID}}"                                # if compute_type=cluster_id, the existing cluster ID
serverless_enabled: "{{SERVERLESS_ENABLED}}"                # "true" | "false"

# ---------- File format defaults ----------
default_input_format: "{{DEFAULT_INPUT_FORMAT}}"            # "csv" | "json" | "parquet" | "delta"
default_storage_format: "delta"                             # always delta downstream
partition_by_default: "{{PARTITION_BY_DEFAULT}}"            # e.g. "ingestion_date" | "" for none

# ---------- Dataset identity ----------
dataset_slug: "{{DATASET_SLUG}}"                            # lowercase-with-hyphens, used in table names
dataset_display_name: "{{DATASET_DISPLAY_NAME}}"            # human-readable, used in report headers
dataset_source: "{{DATASET_SOURCE}}"                        # origin: "IBGE SIDRA", "Brasil.IO", "Kaggle X", etc.
dataset_source_url: "{{DATASET_SOURCE_URL}}"                # canonical URL

# ---------- Ingest metadata ----------
ingestion_date_column: "ingestion_date"                     # added to every Bronze table
source_file_column: "source_file"                           # preserved from raw filename
batch_id_column: "batch_id"                                 # UUID per ingest run